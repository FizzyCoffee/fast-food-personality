<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FFTI — ファストフード性格診断</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@500;700&family=Rubik+Mono+One&family=RocknRoll+One&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="topbar">
  <div class="logo">
    <span class="logo-burger">🍔</span>
    <span class="logo-text">FFTI<sup>®</sup></span>
  </div>
  <div class="top-right">
    <div class="tag" data-i18n="tag"></div>
    <div class="lang-switch" role="group" aria-label="language">
      <button class="lang-btn" data-lang="ja">日本語</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
  </div>
</header>

<!-- FROM-FRIEND BANNER (visible when arriving via shared link) -->
<div id="fromFriendBanner" class="from-friend" hidden>
  <span data-i18n="fromFriend"></span>
  <button id="takeQuizBtn" class="from-friend-btn"><span data-i18n="takeQuizBtn"></span></button>
</div>

<!-- LANDING -->
<section id="landing" class="screen active">
  <div class="hero">
    <div class="sunburst"></div>
    <h1 class="hero-title">
      <span class="line1" data-i18n="heroLine1"></span>
      <span class="line2" data-i18n="heroLine2"></span>
      <span class="line3" data-i18n="heroLine3"></span>
    </h1>
    <p class="hero-sub" data-i18n="heroSub"></p>
    <button id="startBtn" class="cta-btn">
      <span data-i18n="startBtn"></span>
      <span class="cta-sub" data-i18n="startSub"></span>
    </button>
    <p class="disclaimer" data-i18n="disclaimer"></p>

    <div class="menu-sign">
      <div class="menu-sign-title" data-i18n="menuTitle"></div>
      <div class="menu-grid" id="menuGrid"></div>
    </div>
  </div>
</section>

<!-- QUIZ -->
<section id="quiz" class="screen">
  <div class="quiz-wrapper">
    <div class="progress-bar">
      <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
      <div id="progressLabel" class="progress-label"></div>
    </div>

    <div id="questionCard" class="question-card">
      <div class="question-number" id="questionNumber">Q1</div>
      <h2 id="questionText" class="question-text"></h2>
      <div id="answerList" class="answer-list"></div>
    </div>

    <div class="receipt-footer">
      <div data-i18n="orderLabel"></div>
      <div data-i18n="thankYou"></div>
    </div>
  </div>
</section>

<!-- RESULT -->
<section id="result" class="screen">
  <div class="result-wrapper">
    <div class="result-stamp" data-i18n="resultStamp"></div>
    <div id="resultEmoji" class="result-emoji">🍔</div>
    <h1 id="resultName" class="result-name">THE HAMBURGER</h1>
    <div id="resultTag" class="result-tag">"The Reliable Classic"</div>

    <div class="result-card">
      <p id="resultDesc" class="result-desc"></p>

      <div class="stats-grid">
        <div class="stat"><div class="stat-label" data-i18n="statGrease"></div><div class="stat-bar"><div id="statGrease" class="stat-fill"></div></div></div>
        <div class="stat"><div class="stat-label" data-i18n="statChaos"></div><div class="stat-bar"><div id="statChaos" class="stat-fill"></div></div></div>
        <div class="stat"><div class="stat-label" data-i18n="statHeart"></div><div class="stat-bar"><div id="statHeart" class="stat-fill"></div></div></div>
        <div class="stat"><div class="stat-label" data-i18n="statCrunch"></div><div class="stat-bar"><div id="statCrunch" class="stat-fill"></div></div></div>
      </div>

      <div class="compat">
        <div class="compat-row">
          <div class="compat-item good">
            <div class="compat-label" data-i18n="bestFriendLabel"></div>
            <div id="bestFriend" class="compat-value"></div>
          </div>
          <div class="compat-item bad">
            <div class="compat-label" data-i18n="worstEnemyLabel"></div>
            <div id="worstEnemy" class="compat-value"></div>
          </div>
        </div>
      </div>

      <div class="catchphrase">
        <div class="catchphrase-label" data-i18n="catchphraseLabel"></div>
        <div id="catchphrase" class="catchphrase-text"></div>
      </div>
    </div>

    <div class="result-actions">
      <button id="retakeBtn" class="cta-btn small"><span data-i18n="retakeBtn"></span></button>
      <button id="shareBtn" class="cta-btn small alt"><span data-i18n="shareBtn"></span></button>
    </div>

    <div class="all-types">
      <h3 data-i18n="allTypesTitle"></h3>
      <div id="allTypesGrid" class="all-types-grid"></div>
    </div>
  </div>
</section>

<!-- SHARE MODAL -->
<div id="shareModal" class="share-modal" hidden>
  <div class="share-modal-backdrop" data-close></div>
  <div class="share-modal-panel">
    <button class="share-close" data-close aria-label="close">✕</button>
    <div class="share-modal-title" data-i18n="shareModalTitle"></div>
    <div class="share-modal-sub" data-i18n="shareModalSub"></div>

    <div class="share-preview">
      <canvas id="shareCanvas" width="1080" height="1350"></canvas>
    </div>

    <div class="share-buttons">
      <button id="downloadBtn" class="share-btn primary">
        <span class="share-btn-emoji">📸</span>
        <span data-i18n="downloadBtn"></span>
      </button>
      <button id="copyLinkBtn" class="share-btn">
        <span class="share-btn-emoji">🔗</span>
        <span data-i18n="copyLinkBtn"></span>
      </button>
      <button id="twitterBtn" class="share-btn twitter">
        <span class="share-btn-emoji">𝕏</span>
        <span>X / Twitter</span>
      </button>
      <button id="lineBtn" class="share-btn line">
        <span class="share-btn-emoji">💬</span>
        <span>LINE</span>
      </button>
    </div>

    <div id="shareToast" class="share-toast" hidden></div>
  </div>
</div>

<footer class="footbar">
  <div data-i18n="footerLeft"></div>
  <div data-i18n="footerRight"></div>
</footer>

<script src="script.js"></script>
</body>
</html>
